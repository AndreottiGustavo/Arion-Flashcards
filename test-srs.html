<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Teste SRS - Revisão espaçada</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 20px; max-width: 700px; margin: 0 auto; }
    h1 { color: #0a3d3a; }
    h2 { color: #2185d0; margin-top: 24px; font-size: 1rem; }
    pre { background: #f5f5f5; padding: 12px; border-radius: 8px; overflow-x: auto; font-size: 13px; }
    .ok { color: #21ba45; }
    .fail { color: #db2828; font-weight: bold; }
    #log { margin-top: 20px; }
    button { background: #0a3d3a; color: #f4e9c1; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 1rem; }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <h1>🧪 Teste da revisão espaçada (SRS)</h1>
  <p>Simula o fluxo <strong>idêntico</strong> ao <code>js/anki-logic.js</code> sem esperar intervalos reais.</p>
  <button id="run">Rodar testes</button>
  <pre id="log"></pre>

  <script>
    const ANKI = {
      learningSteps: [1, 10],
      lapseSteps: [10],
      graduatingInterval: 1,
      easyInterval: 4,
      startingEase: 2.5,
      easyBonus: 1.3,
      hardInterval: 1.2,
      newInterval: 0.2,
      minEase: 1.3,
      maxInterval: 75
    };

    const DIA_MS = 86400000;
    const MINUTO_MS = 60000;

    function aplicarResposta(card, q, agora) {
      const ls = ANKI.learningSteps;
      const lapses = ANKI.lapseSteps;
      const marcarMinutos = (min) => agora + (min * MINUTO_MS);
      const marcarDias = (dias) => agora + (dias * DIA_MS);

      if (!card.ease) card.ease = ANKI.startingEase;
      if (card.int == null) card.int = 0;
      if (card.step == null) card.step = 0;
      if (!card.state) card.state = 'new';

      if (card.state === 'new' || card.state === 'learning') {
        const steps = (card.prevInt != null) ? lapses : ls;
        if (q === 0) {
          card.state = 'learning';
          card.step = 0;
          card.rev = marcarMinutos(steps[0]);
          return;
        }
        if (q === 1) {
          card.state = 'learning';
          let minHard = steps[card.step];
          if (card.step === 0 && steps.length >= 2) minHard = Math.round((steps[0] + steps[1]) / 2);
          else if (steps.length === 1) minHard = Math.min(1440, Math.round(steps[0] * 1.5));
          card.rev = marcarMinutos(minHard);
          return;
        }
        if (q === 2) {
          card.step++;
          if (card.step < steps.length) {
            card.state = 'learning';
            card.rev = marcarMinutos(steps[card.step]);
            return;
          }
          card.state = 'review';
          if (card.prevInt != null) {
            card.int = Math.max(1, Math.round(card.prevInt * ANKI.newInterval));
            delete card.prevInt;
          } else {
            card.int = ANKI.graduatingInterval;
          }
          card.rev = marcarDias(card.int);
          card.rep = (card.rep || 0) + 1;
          return;
        }
        if (q === 3) {
          card.state = 'review';
          card.int = ANKI.easyInterval;
          if (card.prevInt != null) delete card.prevInt;
          card.rev = marcarDias(card.int);
          card.rep = (card.rep || 0) + 1;
          return;
        }
      }

      if (q === 0) {
        card.ease = Math.max(ANKI.minEase, card.ease - 0.2);
        card.prevInt = card.int;
        card.state = 'learning';
        card.step = 0;
        card.rev = marcarMinutos(lapses[0]);
        return;
      }
      if (q === 1) {
        card.ease = Math.max(ANKI.minEase, card.ease - 0.15);
        card.int = Math.max(card.int + 1, Math.round(card.int * ANKI.hardInterval));
      } else if (q === 2) {
        card.int = Math.max(card.int + 1, Math.round(card.int * card.ease));
      } else if (q === 3) {
        card.ease += 0.15;
        card.int = Math.max(card.int + 1, Math.round(card.int * card.ease * ANKI.easyBonus));
      }
      card.int = Math.min(card.int, ANKI.maxInterval);
      card.rev = marcarDias(card.int);
      card.rep = (card.rep || 0) + 1;
    }

    function formatRev(rev, agora) {
      const diff = rev - agora;
      if (diff < MINUTO_MS * 60) return (diff / MINUTO_MS).toFixed(0) + ' min';
      if (diff < DIA_MS) return (diff / DIA_MS).toFixed(2) + ' dias';
      return (diff / DIA_MS).toFixed(0) + ' dias';
    }

    const logEl = document.getElementById('log');
    let log = '';
    let erros = 0;

    function say(msg, isOk = true) {
      log += (isOk ? '✓ ' : '✗ FALHA: ') + msg + '\n';
      if (!isOk) erros++;
    }

    function run() {
      log = '';
      erros = 0;

      log += '========== TESTE 1: Card NOVO → Bom → Bom (10 min, depois 1 dia) ==========\n\n';
      let agora = Date.now();
      let c = { state: 'new', rev: 0, int: 0, ease: 2.5, step: 0, rep: 0 };

      aplicarResposta(c, 2, agora);
      say('Após 1º Bom: state=' + c.state + ', step=' + c.step, c.state === 'learning' && c.step === 1);
      const rev10min = c.rev;
      const diff10 = Math.abs((rev10min - agora) - 10 * MINUTO_MS);
      say('Próxima revisão em 10 min (obtido: ' + formatRev(rev10min, agora) + ')', diff10 < 1000);

      agora = rev10min + MINUTO_MS;
      c.rev = rev10min;
      aplicarResposta(c, 2, agora);
      say('Após 2º Bom: state=review (graduou), int=1', c.state === 'review' && c.int === 1);
      const rev1d = c.rev;
      say('Próxima revisão em 1 dia', Math.abs((rev1d - agora) - DIA_MS) < 1000);

      log += '\n========== TESTE 2: REVIEW (1d) → Bom → int vira 2d ==========\n\n';
      agora = rev1d + 1000;
      c = { state: 'review', rev: rev1d, int: 1, ease: 2.5, step: 0, rep: 1 };
      aplicarResposta(c, 2, agora);
      say('Review Bom: int de 1 → 2 dias', c.int === 2);
      say('Próxima revisão em 2 dias', Math.abs((c.rev - agora) - 2 * DIA_MS) < 1000);

      log += '\n========== TESTE 3: REVIEW → Fácil (ease sobe, int sobe mais) ==========\n\n';
      agora = c.rev + 1000;
      c = { state: 'review', rev: c.rev, int: 2, ease: 2.5, step: 0, rep: 2 };
      aplicarResposta(c, 3, agora);
      const intEsperado = Math.max(2 + 1, Math.round(2 * 2.5 * ANKI.easyBonus));
      say('Review Fácil: int = ' + intEsperado + ', ease = 2.65', c.int === intEsperado && c.ease === 2.65);

      log += '\n========== TESTE 4: NEW → De novo → rev em 1 min ==========\n\n';
      c = { state: 'new', rev: 0, int: 0, ease: 2.5, step: 0, rep: 0 };
      agora = Date.now();
      aplicarResposta(c, 0, agora);
      say('De novo: learning step 0, rev em 1 min', c.state === 'learning' && Math.abs((c.rev - agora) - MINUTO_MS) < 1000);

      log += '\n========== TESTE 5: LAPSE (review → De novo) → relearning 10 min ==========\n\n';
      c = { state: 'review', rev: agora, int: 5, ease: 2.5, step: 0, rep: 3 };
      aplicarResposta(c, 0, agora);
      say('Lapse: prevInt=5, rev em 10 min', c.state === 'learning' && c.prevInt === 5 && Math.abs((c.rev - agora) - 10 * MINUTO_MS) < 1000);
      agora = c.rev + 1000;
      c.rev = agora - 1000;
      aplicarResposta(c, 2, agora);
      say('Saiu do relearning: int=1 (5*0.2)', c.state === 'review' && c.int === 1);

      log += '\n========== TESTE 6: Cap maxInterval (75 dias) ==========\n\n';
      c = { state: 'review', rev: agora, int: 70, ease: 2.5, step: 0, rep: 10 };
      aplicarResposta(c, 3, agora);
      say('Intervalo limitado a 75 dias (obteve ' + c.int + ')', c.int <= ANKI.maxInterval);

      log += '\n========================================\n';
      if (erros > 0) {
        log += '\n❌ TOTAL: ' + erros + ' falha(s). Revisar lógica SRS.';
      } else {
        log += '✅ Todos os testes passaram. Lógica de revisão espaçada consistente.';
      }

      logEl.textContent = log;
    }

    document.getElementById('run').onclick = run;
    run(); // roda ao abrir a página
  </script>
</body>
</html>
